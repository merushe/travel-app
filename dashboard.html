<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Travel System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="api.js"></script>
    <style>
        body {
            background: #f4f6f9;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .stats-card {
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .stats-card i {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .card-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card-stats2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .card-stats3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .action-btns i {
            font-size: 18px;
            margin: 0 5px;
            cursor: pointer;
        }
        .edit-btn { color: #ffc107; }
        .delete-btn { color: #dc3545; }
        .budget-btn { color: #28a745; }
        .blur-text {
            color: #999;
            font-family: monospace;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-wallet2"></i> Travel Budget System
            </a>
            <div class="d-flex">
                <span class="text-white me-3">
                    <i class="bi bi-person-circle"></i> 
                    <span id="userName"></span>
                    <span class="badge bg-info ms-2" id="userRole"></span>
                </span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Statistik -->
        <div class="row mb-4" id="statsRow">
            <div class="col-md-4">
                <div class="stats-card card-stats">
                    <i class="bi bi-suitcase"></i>
                    <h3 id="totalTravels">0</h3>
                    <p>Total Travel Requests</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card card-stats2">
                    <i class="bi bi-calculator"></i>
                    <h3 id="totalBudgets">0</h3>
                    <p>Total Budgets</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stats-card card-stats3">
                    <i class="bi bi-cash"></i>
                    <h3 id="totalBudget">Rp 0</h3>
                    <p>Total Budget Amount</p>
                </div>
            </div>
        </div>

        <!-- Tombol New Travel -->
        <div class="mb-3">
            <a href="travelform.html" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> New Travel Request
            </a>
        </div>

        <!-- Tabel Travel Requests -->
        <div class="table-container">
            <h5><i class="bi bi-table"></i> Travel Requests</h5>
            <div class="table-responsive">
                <table class="table table-hover" id="travelTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Employee</th>
                            <th>Destination</th>
                            <th>Budget</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="travelTableBody">
                        <tr><td colspan="6" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let allTravels = [];
        
        async function init() {
            currentUser = apiService.getCurrentUser();
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('userName').innerText = currentUser.name || currentUser.email;
            document.getElementById('userRole').innerText = currentUser.role || 'user';
            
            await loadData();
        }
        
        async function loadData() {
            allTravels = await apiService.getAllTravelForms();
            const stats = await apiService.getDashboardStats();
            
            // Filter data berdasarkan role
            let displayTravels = [];
            let showNumbers = false;
            
            if (currentUser.role === 'admin' || currentUser.role === 'manager') {
                // Admin & Manager: bisa lihat SEMUA data + angka
                displayTravels = allTravels;
                showNumbers = true;
            } else {
                // User biasa: hanya lihat travel milik sendiri, angka disembunyikan
                displayTravels = allTravels.filter(travel => travel.employeeEmail === currentUser.email);
                showNumbers = false;
            }
            
            // Update statistik (hanya untuk Admin/Manager)
            if (currentUser.role === 'admin' || currentUser.role === 'manager') {
                document.getElementById('totalTravels').innerText = stats.totalTravelForms || displayTravels.length;
                document.getElementById('totalBudgets').innerText = stats.totalBudgets || 0;
                
                let totalBudgetAmount = 0;
                if (showNumbers) {
                    displayTravels.forEach(travel => {
                        totalBudgetAmount += parseInt(travel.estimatedBudget) || 0;
                    });
                }
                document.getElementById('totalBudget').innerHTML = showNumbers ? `Rp ${formatNumber(totalBudgetAmount)}` : '*******';
            } else {
                // Sembunyikan statistik untuk user biasa
                document.getElementById('totalTravels').innerText = displayTravels.length;
                document.getElementById('totalBudgets').innerText = '***';
                document.getElementById('totalBudget').innerHTML = '*******';
            }
            
            // Render tabel
            renderTable(displayTravels, showNumbers);
        }
        
        function renderTable(travels, showNumbers) {
            const tbody = document.getElementById('travelTableBody');
            tbody.innerHTML = '';
            
            if (travels.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">No travel requests found</td></tr>';
                return;
            }
            
            travels.forEach(travel => {
                const row = tbody.insertRow();
                row.insertCell(0).innerHTML = travel.formId || '-';
                row.insertCell(1).innerHTML = travel.employeeName || '-';
                row.insertCell(2).innerHTML = travel.destination || '-';
                
                // Kolom Budget: sembunyikan untuk user biasa
                const budgetCell = row.insertCell(3);
                if (showNumbers && travel.estimatedBudget) {
                    budgetCell.innerHTML = `Rp ${formatNumber(travel.estimatedBudget)}`;
                } else {
                    budgetCell.innerHTML = '<span class="blur-text">*******</span>';
                }
                
                row.insertCell(4).innerHTML = `<span class="badge bg-secondary">${travel.status || 'draft'}</span>`;
                
                // Action buttons
                const actionCell = row.insertCell(5);
                actionCell.className = 'action-btns';
                
                const canEdit = (currentUser.role === 'admin' || currentUser.role === 'manager' || travel.employeeEmail === currentUser.email);
                
                let buttons = '';
                if (canEdit) {
                    buttons += `<i class="bi bi-pencil-square edit-btn" onclick="editTravel('${travel.formId}')" title="Edit"></i>`;
                    buttons += `<i class="bi bi-trash delete-btn" onclick="deleteTravel('${travel.formId}')" title="Delete"></i>`;
                }
                if (currentUser.role === 'admin' || currentUser.role === 'manager') {
                    buttons += `<i class="bi bi-calculator budget-btn" onclick="viewBudget('${travel.formId}')" title="Budget"></i>`;
                }
                actionCell.innerHTML = buttons || '-';
            });
        }
        
        function editTravel(formId) {
            window.location.href = `travelform.html?id=${formId}`;
        }
        
        async function deleteTravel(formId) {
            if (confirm('Are you sure you want to delete this travel request?')) {
                const result = await apiService.deleteTravelForm(formId);
                if (result.success) {
                    alert('Deleted successfully');
                    loadData();
                } else {
                    alert('Error: ' + result.error);
                }
            }
        }
        
        function viewBudget(formId) {
            window.location.href = `budgetform.html?id=${formId}`;
        }
        
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }
        
        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }
        
        init();
    </script>
</body>
</html>
