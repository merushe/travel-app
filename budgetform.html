<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Form - Travel System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <script src="api.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #2c3e50 !important; }
        .container { max-width: 800px; margin-top: 30px; }
        .card { border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: none; }
        .card-header { background: linear-gradient(135deg, #2c3e50 0%, #1a2530 100%); color: white; border-radius: 15px 15px 0 0 !important; }
        .btn-primary { background: linear-gradient(135deg, #2c3e50 0%, #1a2530 100%); border: none; }
        .btn-primary:hover { background: linear-gradient(135deg, #1a2530 0%, #0f1a22 100%); }
        .form-label { font-weight: 600; color: #2c3e50; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html"><i class="bi bi-wallet2"></i> Travel Budget System</a>
            <div class="d-flex">
                <span class="text-white me-3"><i class="bi bi-person-circle"></i> <span id="userName"></span> <span class="badge bg-info ms-2" id="userRole"></span></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="card">
            <div class="card-header"><h4 class="mb-0"><i class="bi bi-calculator"></i> Budget Form</h4></div>
            <div class="card-body">
                <form id="budgetForm">
                    <div class="mb-3"><label class="form-label">Travel Request ID</label><input type="text" class="form-control" id="formId" readonly></div>
                    <div class="mb-3"><label class="form-label">Employee Name</label><input type="text" class="form-control" id="employeeName" readonly></div>
                    <div class="mb-3"><label class="form-label">Destination</label><input type="text" class="form-control" id="destination" readonly></div>
                    <div class="mb-3"><label class="form-label">Estimated Budget (Rp)</label><input type="text" class="form-control" id="estimatedBudget" readonly></div>
                    <div class="mb-3"><label class="form-label">Actual Budget (Rp)</label><input type="number" class="form-control" id="actualBudget" required></div>
                    <div class="mb-3"><label class="form-label">Notes</label><textarea class="form-control" id="notes" rows="3"></textarea></div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Budget</button>
                    <a href="dashboard.html" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
    <script>
        const user = apiService.getCurrentUser();
        if (!user) window.location.href = 'index.html';
        if (user.role !== 'admin' && user.role !== 'manager') {
            alert('Akses ditolak. Halaman ini hanya untuk Admin dan Manager.');
            window.location.href = 'dashboard.html';
        }
        document.getElementById('userName').innerText = user.name || user.email;
        document.getElementById('userRole').innerText = user.role || 'user';
        const urlParams = new URLSearchParams(window.location.search);
        const formId = urlParams.get('id') || urlParams.get('formId');
        if (!formId) { alert('No travel request selected'); window.location.href = 'dashboard.html'; }
        async function loadBudget() {
            const travel = await apiService.getTravelForm(formId);
            if (travel) {
                document.getElementById('formId').value = travel.formId;
                document.getElementById('employeeName').value = travel.employeeName;
                document.getElementById('destination').value = travel.destination;
                document.getElementById('estimatedBudget').value = travel.estimatedBudget ? 'Rp ' + parseInt(travel.estimatedBudget).toLocaleString('id-ID') : '-';
                const budget = await apiService.getBudget(formId);
                if (budget) {
                    document.getElementById('actualBudget').value = budget.actualBudget || '';
                    document.getElementById('notes').value = budget.notes || '';
                }
            }
        }
        document.getElementById('budgetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const result = await apiService.saveBudget({ formId: formId, actualBudget: parseInt(document.getElementById('actualBudget').value) || 0, notes: document.getElementById('notes').value });
            alert(result.success ? 'Budget saved!' : 'Error: ' + result.error);
            if (result.success) window.location.href = 'dashboard.html';
        });
        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
        loadBudget();
    </script>
</body>
</html>
